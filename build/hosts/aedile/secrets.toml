roles = [
    "dns-master-fudo.org",
    "dns-master-informis.land",
    "dns-master-sea.fudo.org",
]

[[ssh-host-keys]]
source = "ssh/ssh_host_ecdsa_key.age"
target = "ssh_host_ecdsa_key"
target_dir = "/run/aegis/ssh"
user = "root"
group = "root"
mode = "0600"
type = "ecdsa"

[[ssh-host-keys]]
source = "ssh/ssh_host_ed25519_key.age"
target = "ssh_host_ed25519_key"
target_dir = "/run/aegis/ssh"
user = "root"
group = "root"
mode = "0600"
type = "ed25519"

[nexus-key]
source = "nexus-key.age"
target = "/run/aegis/nexus-key"
user = "root"
group = "root"
mode = "0400"
