[[ssh-host-keys]]
source = "ssh/ssh_host_ecdsa_key.age"
target = "ssh_host_ecdsa_key"
target_dir = "/run/aegis/ssh"
user = "root"
group = "root"
mode = "0600"

[[ssh-host-keys]]
source = "ssh/ssh_host_ed25519_key.age"
target = "ssh_host_ed25519_key"
target_dir = "/run/aegis/ssh"
user = "root"
group = "root"
mode = "0600"

[[ssh-host-keys]]
source = "ssh/ssh_host_rsa_key.age"
target = "ssh_host_rsa_key"
target_dir = "/run/aegis/ssh"
user = "root"
group = "root"
mode = "0600"

[nexus-key]
source = "nexus-key.age"
target = "/run/aegis/nexus-key"
user = "root"
group = "root"
mode = "0400"
